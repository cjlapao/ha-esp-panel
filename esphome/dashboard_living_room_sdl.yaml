# ============================================================
# dashboard_living_room_sdl.yaml - SDL2 entrypoint with mock data
# ============================================================
packages:
  base: !include living_room/living_room_base.yaml

substitutions:
  node_name: panel-living-room-sdl
  relay_1_pin: GPIO0
  relay_2_pin: GPIO0

host:
json:

esphome:
  on_boot:
    priority: 200
    then:
      - logger.log: "[sdl] Bypassing splash, injecting mock data"
      - lambda: |-
          id(splash_done) = true;
          id(wifi_connected_flag) = true;
          id(api_connected_flag) = true;
      - lvgl.widget.hide: splash_layer

      # Inject mock sensor values
      - lvgl.label.update:
          id: temp_value_label
          text: "21.5 C"
      - lvgl.label.update:
          id: home_center_temp_label
          text: "21.5°"
      - lvgl.label.update:
          id: home_outside_temp_label
          text: "14°"
      - lvgl.label.update:
          id: home_humidity_label
          text: "58%"
      - lvgl.label.update:
          id: home_center_humidity_label
          text: "58%"
      - lvgl.label.update:
          id: home_wind_label
          text: "12"
      - lvgl.label.update:
          id: home_weather_state_label
          text: "partlycloudy"
      - lvgl.label.update:
          id: lux_value_label
          text: "320 lx"
      - lvgl.label.update:
          id: down_value_label
          text: "DL 94.2 Mbps"
      - lvgl.label.update:
          id: up_value_label
          text: "UL 21.8 Mbps"
      - lvgl.label.update:
          id: wifi_status_label
          text: "${wifi_100_icon}"
      - lvgl.label.update:
          id: ha_status
          text: "${ha_icon}"
      - lvgl.label.update:
          id: presence_label
          text: "Presence 1/3"

interval:
  - interval: 5s
    then:
      - lvgl.bar.update:
          id: left_cover_bar
          value: 50
      - lvgl.bar.update:
          id: center_cover_bar
          value: 75
      - lvgl.bar.update:
          id: right_cover_bar
          value: 25

output:
  - platform: template
    id: backlight_output
    type: float
    write_action:
      - lambda: return;

switch:
  - platform: template
    id: relay_light_1
    name: "Relay Light 1"
    optimistic: true
  - platform: template
    id: relay_light_2
    name: "Relay Light 2"
    optimistic: true

text_sensor:
  - platform: template
    id: wifi_ssid_text
    name: "Wifi SSID"
    update_interval: never
  - platform: template
    id: wifi_ip_text
    name: "Wifi IP"
    update_interval: never

time:
  - platform: homeassistant
    id: panel_time
    timezone: Europe/London

sensor:
  - platform: template
    id: wifi_signal_db
    name: "WiFi Signal"
    update_interval: never

display:
  - platform: sdl
    id: panel_display
    dimensions:
      width: 480
      height: 480
    update_interval: never

touchscreen:
  - platform: sdl
    id: touch_id
    display: panel_display
    on_touch:
      - lambda: |-
          id(inactivity_seconds) = 0;
      - script.execute: restore_backlight_on_activity
