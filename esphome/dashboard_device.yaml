# ============================================================
# dashboard_living_room.yaml - Hardware entrypoint (ESP32)
# ============================================================
packages:
  base: !include living_room/living_room_base.yaml

substitutions:
  relay_1_pin: GPIO1
  relay_2_pin: GPIO2

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_MBEDTLS_CERTIFICATE_BUNDLE: "n"

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: UART0
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  output_power: 20.5dB
  reboot_timeout: 10min
  ap:
    ssid: "${friendly_name} Setup"
    password: !secret ota_password
  on_connect:
    - logger.log: "[wifi] Connected to configured network"
    - lambda: |-
        id(wifi_connected_flag) = true;
    - lvgl.label.update:
        id: wifi_status_label
        text: "WiFi Connected"
        text_color: 0x22c55e
    - lvgl.label.update:
        id: wifi_icon_shared
        text_color: 0x22c55e
    - lvgl.label.update:
        id: wifi_status
        text_color: 0x22c55e
    - lvgl.label.update:
        id: splash_status_line
        text: "Connecting to Home Assistant API..."
    - script.execute: update_splash_retry_line
    - script.execute: maybe_finish_boot
  on_disconnect:
    - logger.log: "[wifi] Disconnected; retrying"
    - lambda: |-
        id(wifi_connected_flag) = false;
        id(api_connected_flag) = false;
        id(wifi_retry_count) += 1;
    - lvgl.label.update:
        id: wifi_status_label
        text: "WiFi Disconnected"
        text_color: 0xef4444
    - lvgl.label.update:
        id: wifi_icon_shared
        text_color: !lambda |-
          return lv_color_hex(id(theme_icon_idle_color));
    - lvgl.label.update:
        id: wifi_status
        text_color: !lambda |-
          return lv_color_hex(id(theme_icon_idle_color));
    - lvgl.label.update:
        id: splash_status_line
        text: "Retrying WiFi connection..."
    - script.execute: update_splash_retry_line
    - if:
        condition:
          lambda: 'return (id(wifi_retry_count) % 5) == 0;'
        then:
          - logger.log: "[wifi] Forcing WiFi stack restart after 5 retries"
          - wifi.disable:
          - delay: 1200ms
          - wifi.enable:

script:
  - id: boot_monitor_tick
    then:
      - if:
          condition:
            lambda: 'return !id(splash_done);'
          then:
            - lambda: 'id(boot_elapsed_sec) += 2;'
            - lvgl.label.update:
                id: splash_status_line
                text: !lambda |-
                  if (!id(wifi_connected_flag)) return std::string("Connecting to WiFi...");
                  if (!id(api_connected_flag)) return std::string("WiFi connected. Waiting for API...");
                  return std::string("Connected. Loading dashboard...");
            - logger.log:
                format: "[boot] t=%ds wifi=%d api=%d retries(wifi=%d api=%d)"
                args: [ 'id(boot_elapsed_sec)', 'id(wifi_connected_flag)', 'id(api_connected_flag)', 'id(wifi_retry_count)', 'id(api_retry_count)' ]
            - if:
                condition:
                  lambda: 'return !id(wifi_connected_flag) && (id(boot_elapsed_sec) % 8 == 0);'
                then:
                  - lambda: 'id(wifi_retry_count) += 1;'
                  - logger.log:
                      format: "[wifi] Active retry #%d"
                      args: [ 'id(wifi_retry_count)' ]
                  - lvgl.label.update:
                      id: splash_status_line
                      text: "Connecting to WiFi..."
                  - script.execute: update_splash_retry_line
                  - wifi.disable:
                  - delay: 600ms
                  - wifi.enable:
            - if:
                condition:
                  lambda: 'return id(wifi_connected_flag) && !id(api_connected_flag) && (id(boot_elapsed_sec) % 10 == 0);'
                then:
                  - lambda: 'id(api_retry_count) += 1;'
                  - logger.log:
                      format: "[api] Waiting for API, retry marker #%d"
                      args: [ 'id(api_retry_count)' ]
                  - lvgl.label.update:
                      id: splash_status_line
                      text: "WiFi connected. Waiting for API..."
                  - script.execute: update_splash_retry_line
            - if:
                condition:
                  lambda: 'return id(boot_elapsed_sec) > 120 && !id(api_connected_flag);'
                then:
                  - logger.log: "[boot] API still unavailable after timeout"
                  - lvgl.label.update:
                      id: splash_status_line
                      text: "API timeout. Continuing in local mode."
                  - delay: 1200ms
                  - lambda: 'id(splash_done) = true;'
                  - lvgl.widget.hide: splash_layer

interval:
  - interval: 2s
    then:
      - script.execute: boot_monitor_tick

captive_portal:
web_server:
ota:
  - platform: esphome
    password: !secret ota_password

output:
  - platform: ledc
    pin: GPIO38
    id: backlight_output
    frequency: 200Hz

switch:
  - platform: gpio
    id: relay_light_1
    name: "${room_name} Relay Light 1"
    pin: ${relay_1_pin}
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: gpio
    id: relay_light_2
    name: "${room_name} Relay Light 2"
    pin: ${relay_2_pin}
    restore_mode: RESTORE_DEFAULT_OFF

text_sensor:
  - platform: wifi_info
    ssid:
      id: wifi_ssid_text
      on_value:
        - lvgl.label.update:
            id: wifi_detail_label
            text: !lambda |-
              if (id(wifi_ssid_text).state.empty()) {
                return std::string("SSID: --");
              }
              return std::string("SSID: ") + id(wifi_ssid_text).state;
    ip_address:
      id: wifi_ip_text
      on_value:
        - lvgl.label.update:
            id: ip_detail_label
            text: !lambda |-
              if (id(wifi_ip_text).state.empty()) {
                return std::string("IP: --");
              }
              return std::string("IP: ") + id(wifi_ip_text).state;

time:
  - platform: sntp
    id: panel_time
    timezone: Europe/London
    on_time:
      - seconds: /1
        then:
          - lvgl.label.update:
              id: home_time_label
              text: !lambda |-
                auto t = id(panel_time).now();
                if (!t.is_valid()) return std::string("--:--");
                return t.strftime("%H:%M");
          - lvgl.label.update:
              id: home_day_label
              text: !lambda |-
                auto t = id(panel_time).now();
                if (!t.is_valid()) return std::string("--");
                return t.strftime("%A");
          - lvgl.label.update:
              id: home_date_label
              text: !lambda |-
                auto t = id(panel_time).now();
                if (!t.is_valid()) return std::string("--");
                return t.strftime("%d, %B");

sensor:
  - platform: wifi_signal
    id: wifi_signal_db
    name: "${room_name} WiFi Signal"
    update_interval: 30s
    on_value:
      - lvgl.label.update:
          id: wifi_status_label
          text:
            format: "WiFi %.0f dBm"
            args: [id(wifi_signal_db).state]

i2c:
  - id: bus_a
    sda: GPIO19
    scl:
      number: GPIO45
      ignore_strapping_warning: true
    frequency: 100kHz

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

display:
  - platform: st7701s
    id: panel_display
    update_interval: never
    auto_clear_enabled: false
    data_rate: 2MHz
    spi_mode: MODE3
    color_order: RGB
    invert_colors: false
    dimensions:
      width: 480
      height: 480
    cs_pin: 39
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xCD, 0x00]
    pclk_frequency: 12MHz
    pclk_inverted: false
    data_pins:
      red: [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue: [4, 5, 6, 7, 15]

touchscreen:
  platform: gt911
  id: touch_id
  display: panel_display
  on_touch:
    - lambda: |-
        id(inactivity_seconds) = 0;
    - script.execute: restore_backlight_on_activity
    - if:
        condition:
          light.is_off: display_backlight
        then:
          - logger.log: "[ui] Wake display on touch"
          - light.turn_on:
              id: display_backlight
              transition_length: 0s
              brightness: !lambda |-
                return id(backlight_restore_brightness);

