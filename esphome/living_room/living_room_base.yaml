light:
  - platform: monochromatic
    output: backlight_output
    id: display_backlight
    name: "${room_name} Display Backlight"
    default_transition_length: 0s
    restore_mode: ALWAYS_ON

binary_sensor:
  - platform: status
    id: api_connected
    name: "${room_name} API Connected"
    on_state:
      - lambda: |-
          id(api_connected_flag) = id(api_connected).state;
          if (id(api_connected).state) {
            id(api_retry_count) = 0;
          } else if (id(wifi_connected_flag)) {
            id(api_retry_count) += 1;
          }
      - logger.log:
          format: "[api] State changed: %s"
          args: ['id(api_connected).state ? "connected" : "disconnected"']
      - lvgl.label.update:
          id: api_status_label
          text: !lambda |-
            return id(api_connected).state ? std::string("HA: Online") : std::string("HA: Offline");
      - lvgl.label.update:
          id: api_status_label
          text_color: !lambda |-
            return id(api_connected).state ? lv_color_hex(0x22c55e) : lv_color_hex(0xef4444);
      - lvgl.label.update:
          id: ha_icon_shared
          text_color: !lambda |-
            return id(api_connected).state ? lv_color_hex(0x22c55e) : lv_color_hex(id(theme_icon_idle_color));
      - lvgl.label.update:
          id: ha_status
          text_color: !lambda |-
            return id(api_connected).state ? lv_color_hex(0x22c55e) : lv_color_hex(id(theme_icon_idle_color));
      - lvgl.label.update:
          id: splash_status_line
          text: !lambda |-
            if (id(api_connected).state) return std::string("System online. Loading dashboard...");
            if (id(wifi_connected_flag)) return std::string("WiFi up, waiting for API...");
            return std::string("Connecting to WiFi...");
      - script.execute: update_splash_retry_line
      - script.execute: maybe_finish_boot

  - platform: homeassistant
    id: light_1_state
    entity_id: ${light_1_entity}
    on_state:
      - script.execute: refresh_lights

  - platform: homeassistant
    id: light_2_state
    entity_id: ${light_2_entity}
    on_state:
      - script.execute: refresh_lights

  - platform: homeassistant
    id: light_3_state
    entity_id: ${light_3_entity}
    on_state:
      - script.execute: refresh_lights

  - platform: homeassistant
    id: light_4_state
    entity_id: ${light_4_entity}
    on_state:
      - script.execute: refresh_lights

  - platform: homeassistant
    id: presence_1
    entity_id: ${presence_1_entity}
    on_state:
      - script.execute: refresh_presence

  - platform: homeassistant
    id: presence_2
    entity_id: ${presence_2_entity}
    on_state:
      - script.execute: refresh_presence

  - platform: homeassistant
    id: presence_3
    entity_id: ${presence_3_entity}
    on_state:
      - script.execute: refresh_presence

text_sensor:
  - platform: homeassistant
    id: weather_state_text
    entity_id: ${weather_entity}
    on_value:
      - lvgl.label.update:
          id: home_weather_state_label
          text: !lambda |-
            if (id(weather_state_text).state.empty()) return std::string("--");
            return id(weather_state_text).state;
      - script.execute: update_home_weather_image

  - platform: homeassistant
    id: weather_forecast_daily_sensor
    entity_id: sensor.display_tools_forecasts_daily
    attribute: forecasts
    internal: true
    on_value:
      then:
        - script.execute: parse_daily_forecasts

  - platform: homeassistant
    id: weather_forecast_hourly_sensor
    entity_id: sensor.display_tools_forecasts_hourly
    attribute: forecasts
    internal: true
    on_value:
      then:
        - script.execute: parse_hourly_forecasts

sensor:
  - platform: homeassistant
    id: weather_temp_outside
    entity_id: ${weather_entity}
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: home_outside_temp_label
          text:
            format: "%.0f°"
            args: [id(weather_temp_outside).state]

  - platform: homeassistant
    id: weather_humidity_outside
    entity_id: ${weather_entity}
    attribute: humidity
    on_value:
      - lvgl.label.update:
          id: home_humidity_label
          text:
            format: "%.0f%%"
            args: [id(weather_humidity_outside).state]
      - lvgl.label.update:
          id: home_center_humidity_label
          text:
            format: "%.0f%%"
            args: [id(weather_humidity_outside).state]

  - platform: homeassistant
    id: weather_wind_outside
    entity_id: ${weather_entity}
    attribute: wind_speed
    on_value:
      - lvgl.label.update:
          id: home_wind_label
          text:
            format: "%.0f"
            args: [id(weather_wind_outside).state]
      - lvgl.label.update:
          id: weather_wind_speed_unit
          text: "m/s"

  - platform: homeassistant
    id: room_temperature
    entity_id: ${temp_entity}
    on_value:
      - lvgl.label.update:
          id: temp_value_label
          text:
            format: "%.1f C"
            args: [id(room_temperature).state]
      - lvgl.label.update:
          id: home_center_temp_label
          text:
            format: "%.1f°"
            args: [id(room_temperature).state]

  - platform: homeassistant
    id: room_light_level
    entity_id: ${light_level_entity}
    on_value:
      - lvgl.label.update:
          id: lux_value_label
          text:
            format: "%.0f lx"
            args: [id(room_light_level).state]

  - platform: homeassistant
    id: net_download
    entity_id: ${internet_download_entity}
    on_value:
      - lvgl.label.update:
          id: down_value_label
          text:
            format: "DL %.1f Mbps"
            args: [id(net_download).state]

  - platform: homeassistant
    id: net_upload
    entity_id: ${internet_upload_entity}
    on_value:
      - lvgl.label.update:
          id: up_value_label
          text:
            format: "UL %.1f Mbps"
            args: [id(net_upload).state]

  - platform: homeassistant
    id: cover_left_pos
    entity_id: ${cover_left_entity}
    attribute: current_position
    on_value:
      - script.execute: refresh_covers

  - platform: homeassistant
    id: cover_center_pos
    entity_id: ${cover_center_entity}
    attribute: current_position
    on_value:
      - script.execute: refresh_covers

  - platform: homeassistant
    id: cover_right_pos
    entity_id: ${cover_right_entity}
    attribute: current_position
    on_value:
      - script.execute: refresh_covers


select:
  - platform: template
    id: theme_accent_select
    name: "${room_name} Theme Accent"
    optimistic: true
    restore_value: true
    initial_option: slate
    options:
      - slate
      - gray
      - zinc
      - neutral
      - stone
      - red
      - orange
      - amber
      - yellow
      - lime
      - green
      - emerald
      - teal
      - cyan
      - sky
      - blue
      - indigo
      - violet
      - purple
      - fuchsia
      - pink
      - rose
    on_value:
      - lambda: |-
          id(theme_name) = x;
          id(inactivity_seconds) = 0;
      - logger.log:
          format: "[theme] Requested accent: %s"
          args: ['x.c_str()']
      - script.execute: apply_selected_theme

number:
  - platform: template
    id: display_timeout_backlight
    name: "${room_name} Backlight Timeout"
    optimistic: true
    unit_of_measurement: "m"
    initial_value: 10
    restore_value: true
    min_value: -1
    max_value: 720
    step: 1
    mode: box

globals:
  - id: wifi_connected_flag
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: api_connected_flag
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: splash_done
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: wifi_retry_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: api_retry_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: boot_elapsed_sec
    type: int
    restore_value: false
    initial_value: '0'
  - id: inactivity_seconds
    type: int
    restore_value: false
    initial_value: '0'
  - id: active_page_id
    type: int
    restore_value: false
    initial_value: '0'
  - id: theme_name
    type: std::string
    restore_value: true
    initial_value: '"slate"'
  - id: theme_accent_color
    type: uint32_t
    restore_value: true
    initial_value: 0x${tw_slate_500}
  - id: theme_background_color
    type: uint32_t
    restore_value: true
    initial_value: 0x${tw_slate_950}
  - id: theme_panel_color
    type: uint32_t
    restore_value: true
    initial_value: 0x${tw_slate_900}
  - id: theme_border_color
    type: uint32_t
    restore_value: true
    initial_value: 0x${tw_slate_700}
  - id: theme_button_color
    type: uint32_t
    restore_value: true
    initial_value: 0x${tw_slate_700}
  - id: theme_text_color
    type: uint32_t
    restore_value: true
    initial_value: 0x${tw_slate_200}
  - id: theme_muted_color
    type: uint32_t
    restore_value: true
    initial_value: 0x${tw_slate_400}
  - id: theme_icon_idle_color
    type: uint32_t
    restore_value: true
    initial_value: 0x${tw_slate_500}
  - id: display_timeout
    type: int
    restore_value: true
    initial_value: '2'
  - id: backlight_dimmed
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: backlight_restore_brightness
    type: float
    restore_value: false
    initial_value: '1.0'

  # Forecast daily data
  - id: forecast_daily_count
    type: int
    initial_value: '0'
  - id: forecast_daily_timestamps
    type: time_t[10]
  - id: forecast_daily_temps
    type: float[10]
  - id: forecast_daily_conditions
    type: std::string[10]

  # Forecast hourly data
  - id: forecast_hourly_count
    type: int
    initial_value: '0'
  - id: forecast_hourly_timestamps
    type: time_t[15]
  - id: forecast_hourly_temps
    type: float[15]
  - id: forecast_hourly_conditions
    type: std::string[15]

script:
  - id: go_home_page
    then:
      - lambda: |-
          id(active_page_id) = 0;
          id(inactivity_seconds) = 0;
      - lvgl.widget.hide: shared_top_bar
      - lvgl.widget.hide: shared_bottom_bar
      - lvgl.page.show: home_page
      - script.execute: update_home_weather_image

  - id: go_dashboard_page
    then:
      - lambda: |-
          id(active_page_id) = 2;
          id(inactivity_seconds) = 0;
      - lvgl.widget.show: shared_top_bar
      - lvgl.widget.show: shared_bottom_bar
      - lvgl.page.show: dashboard_page

  - id: go_lights_page
    then:
      - lambda: |-
          id(active_page_id) = 1;
          id(inactivity_seconds) = 0;
      - lvgl.widget.show: shared_top_bar
      - lvgl.widget.show: shared_bottom_bar
      - lvgl.page.show: lights_page

  - id: go_settings_page
    then:
      - lambda: |-
          id(inactivity_seconds) = 0;
      - lvgl.widget.show: shared_top_bar
      - lvgl.widget.show: shared_bottom_bar
      - if:
          condition:
            lambda: 'return id(active_page_id) == 0;'
          then:
            - lvgl.page.show:
                id: settings_page
                animation: MOVE_LEFT
                time: 320ms
          else:
            - lvgl.page.show: settings_page
      - lambda: |-
          id(active_page_id) = 3;

  - id: go_weather_page
    then:
      - lambda: |-
          id(inactivity_seconds) = 0;
      - lvgl.widget.hide: shared_top_bar
      - lvgl.widget.hide: shared_bottom_bar
      - lvgl.page.show: weather_page
      - lambda: |-
          id(active_page_id) = 4;

  - id: restore_backlight_on_activity
    then:
      - if:
          condition:
            lambda: 'return id(backlight_dimmed);'
          then:
            - logger.log:
                format: "[ui] Restoring backlight after inactivity (%.2f)"
                args: ['id(backlight_restore_brightness)']
            - light.turn_on:
                id: display_backlight
                transition_length: 0s
                brightness: !lambda |-
                  return id(backlight_restore_brightness);
            - lambda: |-
                id(backlight_dimmed) = false;

  - id: dim_backlight_for_inactivity
    then:
      - if:
          condition:
            lambda: 'return !id(backlight_dimmed) && id(inactivity_seconds) >= 300 && id(display_backlight).current_values.is_on();'
          then:
            - lambda: |-
                float current = id(display_backlight).current_values.get_brightness();
                if (current > 0.01f) {
