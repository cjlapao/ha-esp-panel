id: settings_page
widgets:
  - obj:
      id: settings_root_bg
      width: 480
      height: 480
      bg_color: 0x000000
      border_opa: TRANSP
      radius: 0
      scrollable: false
      scrollbar_mode: "OFF"

  - obj:
      id: settings_card
      width: 440
      height: 360
      y: 44
      align: TOP_MID
      radius: 24
      bg_color: 0x2b3249
      border_width: 1
      border_color: 0x3d4867
      pad_all: 0
      scrollable: false
      scrollbar_mode: "OFF"
      widgets:
        - label:
            id: settings_title_label
            x: 20
            y: 18
            text: "Theme"
            text_font: montserrat_34
            text_color: 0xc7d2fe
        - label:
            id: settings_subtitle_label
            x: 20
            y: 60
            text: "Tailwind accent palette"
            text_font: montserrat_20
            text_color: 0x94a3b8
        - obj:
            id: settings_theme_selector_row
            x: 20
            y: 92
            width: 400
            height: 88
            radius: 18
            bg_color: 0x0f172a
            border_width: 1
            border_color: 0x334155
            scrollable: false
            scrollbar_mode: "OFF"
            widgets:
              - button:
                  id: settings_theme_prev_button
                  x: 10
                  y: 16
                  width: 70
                  height: 56
                  radius: 14
                  bg_color: 0x334155
                  on_click:
                    - select.previous: theme_accent_select
                  widgets:
                    - label:
                        align: CENTER
                        text: "Prev"
                        text_font: montserrat_18
                        text_color: 0xe2e8f0
              - label:
                  id: settings_theme_value_label
                  align: CENTER
                  y: -12
                  text: "slate"
                  text_font: montserrat_24
                  text_color: 0xe2e8f0
              - label:
                  id: settings_theme_hex_label
                  align: CENTER
                  y: 18
                  text: "#64748B"
                  text_font: montserrat_18
                  text_color: 0x94a3b8
              - button:
                  id: settings_theme_next_button
                  x: 320
                  y: 16
                  width: 70
                  height: 56
                  radius: 14
                  bg_color: 0x334155
                  on_click:
                    - select.next: theme_accent_select
                  widgets:
                    - label:
                        align: CENTER
                        text: "Next"
                        text_font: montserrat_18
                        text_color: 0xe2e8f0
        - obj:
            id: settings_preview_panel
            x: 20
            y: 198
            width: 400
            height: 108
            radius: 18
            bg_color: 0x0f172a
            border_width: 1
            border_color: 0x334155
            scrollable: false
            scrollbar_mode: "OFF"
            widgets:
              - obj:
                  id: settings_preview_accent_dot
                  x: 22
                  y: 36
                  width: 36
                  height: 36
                  radius: 18
                  bg_color: 0x64748b
                  border_opa: TRANSP
                  scrollable: false
                  scrollbar_mode: "OFF"
              - label:
                  id: settings_preview_text
                  x: 74
                  y: 28
                  text: "Auto dark shades from accent"
                  text_font: montserrat_20
                  text_color: 0xe2e8f0
              - label:
                  id: settings_hint_label
                  x: 74
                  y: 58
                  text: "BG, panel, border computed"
                  text_font: montserrat_16
                  text_color: 0x94a3b8
        - label:
            x: 20
            y: 318
            text: "Default theme: slate"
            text_font: montserrat_16
            text_color: 0x94a3b8
