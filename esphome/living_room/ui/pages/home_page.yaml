id: home_page
bg_color: color_black
scrollable: false
widgets:
  - obj:
      id: home_root_bg
      width: 480
      height: 480
      align: CENTER
      clickable: false
      scrollable: false
      pad_all: 0
      radius: 0
      bg_color: color_black
      border_opa: transp
      shadow_opa: transp

  # indicators
  - obj:
      id: home_bg_indicators
      y: 10
      width: 460
      height: 40
      align: TOP_MID
      pad_all: 0
      bg_color: color_steel_blue
      bg_opa: transp
      border_opa: transp
      border_width: 0
      shadow_opa: transp
      widgets:

        # Wi-Fi status
        - label:
            id: wifi_status
            align: left_mid
            x: 20
            text: "${wifi_100_icon}"
            text_color: color_steel_blue
            text_font: icons_24

        # Home Assistant status
        - label:
            id: ha_status
            align: left_mid
            x: 60
            text: "${ha_icon}"
            text_color: color_steel_blue
            text_font: mdi_icons_24

        # Lock status
        - label:
            id: lock_status
            align: left_mid
            x: 100
            text: "${lock_icon}"
            text_color: color_steel_blue
            text_font: icons_24

        # Heating status
        - label:
            id: heating_status
            align: right_mid
            x: -20
            text: "${heating_icon}"
            text_color: color_steel_blue
            text_font: icons_24

        # AC status
        - label:
            id: ac_status
            align: right_mid
            x: -60
            y: 2
            text: "${air_conditioner_icon}"
            text_color: color_steel_blue
            text_font: icons_24

        # Alarm panel status
        - label:
            id: alarm_panel_status
            align: right_mid
            x: -100
            text: "${shield_arming_icon}"
            text_color: color_steel_blue
            text_font: mdi_icons_24

  # weather section
  - obj:
      id: home_weather_card
      hidden: false
      y: 60
      width: 440
      height: 220
      align: top_mid
      clickable: false
      scrollable: false
      radius: 20
      pad_all: 0
      bg_color: color_slate_blue_gray
      border_opa: transp
      border_width: 0
      shadow_opa: transp
      widgets:
        - obj:
            id: weather_time_widget
            hidden: false
            width: 440
            height: 80
            align: top_mid
            clickable: false
            radius: 20
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            border_width: 0
            shadow_opa: transp
            widgets:
              - label:
                  id: home_outside_temp_label
                  x: 30
                  y: 10
                  align: top_left
                  text_font: nunito_48
                  text_color: color_misty_blue
                  text: "-24°"
                  text_align: right

              - label:
                  id: home_humidity_label
                  x: -60
                  y: 10
                  align: top_right
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: " "
                  text_align: right

              - label:
                  id: weather_humidity_measurement
                  x: -60
                  y: 10
                  align: top_right
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "%"
                  text_align: right
                
              - label:
                  id: weather_humidity_icon
                  x: -30
                  y: 10
                  align: top_right
                  text_font: icons_24
                  text_color: color_blue
                  text: "${humidity_icon}"
                  text_align: right

              - label:
                  id: home_wind_label
                  x: -90
                  y: 40
                  align: top_right
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: " "
                  text_align: right

              - label:
                  id: weather_wind_speed_unit
                  x: -60
                  y: 40
                  align: top_right
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: " "
                  text_align: right

              - label:
                  id: weather_wind_speed_icon
                  x: -30
                  y: 40
                  align: top_right
                  text_font: mdi_icons_24
                  text_color: color_misty_blue
                  text: "${windsock_icon}"
                  text_align: right

              - image:
                  id: weather_wind_speed_image
                  y: 40
                  x: -12
                  align: top_right
                  src: home_windsock_img

              - obj:
                  id: weather_time_widget_line
                  y: -5
                  width: 400
                  height: 2
                  align: bottom_mid
                  bg_color: color_misty_blue
                  border_opa: transp
                  shadow_opa: transp

        - obj: 
            id: datetime_widget
            y: 80
            hidden: false
            width: 440
            height: 140
            align: top_mid
            clickable: false
            radius: 20
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            border_width: 0
            shadow_opa: transp
            widgets:
              - label:
                  id: home_day_label
                  x: 40
                  y: 105
                  align: top_left
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Monday"

              - label:
                  id: home_date_label
                  x: -40
                  y: 105
                  align: top_right
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "31, December"

              - label:
                  id: home_time_label
                  y: 0
                  align: top_mid
                  text_font: nunito_64
                  text_color: color_misty_blue
                  text: "23:59"

              - obj:
                  id: datetime_widget_line
                  y: -50
                  width: 400
                  height: 2
                  align: bottom_mid
                  bg_color: color_misty_blue
                  border_opa: transp
                  shadow_opa: transp


        - obj: 
            id: weather_widget
            y: 40
            hidden: true
            width: 440
            height: 80
            align: top_mid
            clickable: false
            radius: 20
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            border_width: 0
            shadow_opa: transp
            widgets:
              - label:
                  id: home_weather_state_label
                  y: -5
                  width: 380
                  height: 30
                  align:  bottom_mid
                  text_font: nunito_18
                  text_color: color_misty_blue
                  long_mode: SCROLL_CIRCULAR
                  text: " "
                  text_align: center

        - obj:
            id: info_widget
            hidden: true
            width: 440
            height: 220
            align: top_mid
            clickable: false
            radius: 20
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            border_width: 0
            shadow_opa: transp
            widgets:
              - label:  
                  id: wifi_signal_info_label
                  x: 20
                  y: 30
                  align: top_left
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: "WiFi Signal:"
              - label:  
                  id: wifi_signal_info_state
                  x: -20
                  y: 30
                  align: top_right
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: "-59 dBm"
              - label:  
                  id: ip_address_info_label
                  x: 20
                  y: 70
                  align: top_left
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: "IP Address:"
              - label:  
                  id: ip_address_info_state
                  x: -20
                  y: 70
                  align: top_right
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: "192.168.0.10"
              - label:  
                  id: mac_address_info_label
                  x: 20
                  y: 110
                  align: top_left
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: "MAC Address:"
              - label:  
                  id: mac_address_info_state
                  x: -20
                  y: 110
                  align: top_right
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: "12:34:56:78:90:AB"
              - label:  
                  id: esphome_version_info_label
                  x: 20
                  y: 150
                  align: top_left
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: "ESPHome Version:"
              - label:  
                  id: esphome_version_info_state
                  x: -20
                  y: 150
                  align: top_right
                  text_font: nunito_18
                  text_color: color_misty_blue
                  text: "2025.9.0"

        - obj:
            id: settings_widget
            hidden: true
            width: 440
            height: 220
            align: top_mid
            clickable: false
            radius: 20
            pad_all: 0
            bg_color: color_slate_blue_gray
            bg_opa: transp
            border_opa: transp
            border_width: 0
            shadow_opa: transp
            widgets:
              - obj:
                  id: backlight_settings_brightness_background
                  width: 220
                  height: 220
                  align: top_left
                  clickable: false
                  radius: 20
                  pad_all: 0
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  border_width: 0
                  shadow_opa: transp
                  widgets:
                    - label:  
                        id: backlight_settings_brightness_label
                        y: 20
                        align: top_mid
                        text_font: nunito_18
                        text_color: color_misty_blue
                        text: "Backlight"

                    - slider:
                        id: backlight_settings_brightness_slider
                        y: -20
                        radius: 10
                        bg_color: color_gray
                        align: bottom_mid
                        width: 40
                        height: 140
                        min_value: 35
                        max_value: 100
                        value: 100
                        indicator:
                          bg_color: color_misty_blue
                          radius: 10
                        knob:
                          bg_opa: transp
                        on_release:
                          - lambda: |-
                              id(backlight_restore_brightness) = int(x) / 100.0f;
                          - light.turn_on:
                              id: display_backlight
                              transition_length: 0s
                              brightness: !lambda return int(x)/ 100.0;

              - obj:
                  id: backlight_settings_sleep_time_background
                  width: 220
                  height: 220
                  align: top_right
                  clickable: false
                  radius: 20
                  pad_all: 0
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  border_width: 0
                  shadow_opa: transp
                  widgets:
                    - label:  
                        id: backlight_settings_sleep_time_label
                        y: 20
                        align: top_mid
                        text_font: nunito_18
                        text_color: color_misty_blue
                        text: "Sleep time"
                    - roller:
                        id: backlight_settings_sleep_time_roller
                        y: 10
                        width: 140
                        align: center
                        bg_opa: transp
                        border_opa: transp
                        shadow_opa: transp
                        text_font: nunito_20
                        text_color: color_steel_blue
                        text_line_space: 4
                        selected:
                          bg_opa: transp
                          text_font: nunito_20
                          text_color: color_misty_blue
                        selected_index: !lambda return id(display_timeout);
                        options:
                          - Never
                          - 1 minute
                          - 5 minutes
                          - 10 minutes
                          - 30 minutes
                          - 1 hour
                          - 6 hours
                          - 12 hours
                        visible_row_count: 1
                        on_value:
                            then:
                              - number.set:
                                  id: display_timeout_backlight
                                  value: !lambda |-
                                    static const int backlight_time[] = {-1, 1, 5, 10, 30, 60, 360, 720};
                                    return backlight_time[x];
                              - globals.set:
                                  id: display_timeout
                                  value: !lambda return x;


