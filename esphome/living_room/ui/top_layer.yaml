  widgets:
    - obj:
        id: shared_top_bar
        hidden: true
        width: 480
        height: 40
        align: TOP_MID
        y: 0
        bg_opa: TRANSP
        border_opa: TRANSP
        scrollable: false
        scrollbar_mode: "OFF"
        pad_all: 0
        layout:
          type: FLEX
          flex_flow: ROW
          flex_align_main: SPACE_BETWEEN
          flex_align_cross: CENTER
        widgets:
          - obj:
              width: 140
              height: 36
              bg_opa: TRANSP
              border_opa: TRANSP
              scrollable: false
              scrollbar_mode: "OFF"
              layout:
                type: FLEX
                flex_flow: ROW
                flex_align_main: SPACE_EVENLY
                flex_align_cross: CENTER
              widgets:
                - label:
                    id: wifi_icon_shared
                    text: "\U000F05A9"
                    text_font: mdi_26
                    text_color: 0x64748b
                - label:
                    id: ha_icon_shared
                    text: "\U000F07D0"
                    text_font: mdi_26
                    text_color: 0x64748b
          - obj:
              width: 140
              height: 36
              bg_opa: TRANSP
              border_opa: TRANSP
              scrollable: false
              scrollbar_mode: "OFF"
              layout:
                type: FLEX
                flex_flow: ROW
                flex_align_main: SPACE_EVENLY
                flex_align_cross: CENTER
              widgets:
                - label:
                    id: shield_icon_shared
                    text: "\U000F0498"
                    text_font: mdi_26
                    text_color: 0x64748b
                - label:
                    id: ac_icon_shared
                    text: "\U000F001B"
                    text_font: mdi_26
                    text_color: 0x64748b
                - label:
                    id: heat_icon_shared
                    text: "\U000F0438"
                    text_font: mdi_26
                    text_color: 0x64748b

    - obj:
        id: shared_bottom_bar
        hidden: true
        width: 440
        height: 60
        align: BOTTOM_MID
        y: -20
        radius: 20
        bg_color: color_slate_blue_gray
        border_opa: TRANSP
        border_width: 0
        scrollable: false
        scrollbar_mode: "OFF"
        pad_all: 0
        widgets:
          - button:
              id: shared_home_btn
              clickable: true
              x: 110
              width: 52
              height: 50
              align: LEFT_MID
              bg_opa: TRANSP
              shadow_opa: TRANSP
              on_click:
                - script.execute: go_home_page
              widgets:
                - label:
                    id: bottom_home_icon
                    align: CENTER
                    text: "${home_icon}"
                    text_font: mdi_icons_28
                    text_color: color_misty_blue
          - button:
              id: shared_lock_btn
              clickable: true
              x: 10
              width: 52
              height: 50
              align: LEFT_MID
              bg_opa: TRANSP
              shadow_opa: TRANSP
              on_click:
                - logger.log: "[ui] Lock button pressed (screen off)"
                - light.turn_off: display_backlight
              widgets:
                - label:
                    id: bottom_lock_icon
                    align: CENTER
                    text: "${lock_variant_icon}"
                    text_font: mdi_icons_28
                    text_color: color_misty_blue
          - button:
              id: shared_power_btn
              clickable: true
              x: 60
              width: 52
              height: 50
              align: LEFT_MID
              bg_opa: TRANSP
              shadow_opa: TRANSP
              on_click:
                - delay: 1s
                - light.turn_off: display_backlight
                - lvgl.pause:
                - logger.log: "[ui] Screen off pressed"
              widgets:
                - label:
                    id: bottom_power_icon
                    align: CENTER
                    text: "${brightness_icon}"
                    text_font: mdi_icons_28
                    text_color: color_misty_blue
          - button:
              id: shared_info_btn
              clickable: true
              x: -60
              width: 52
              height: 50
              align: RIGHT_MID
              bg_opa: TRANSP
              shadow_opa: TRANSP
              on_click:
                - script.execute: go_dashboard_page
              widgets:
                - label:
                    id: bottom_info_icon
                    align: CENTER
                    text: "${info_icon}"
                    text_font: mdi_icons_28
                    text_color: color_misty_blue
          - button:
              id: shared_settings_btn
              clickable: true
              x: -10
              width: 52
              height: 50
              align: RIGHT_MID
              bg_opa: TRANSP
              shadow_opa: TRANSP
              on_click:
                - script.execute: go_settings_page
              widgets:
                - label:
                    id: bottom_settings_icon
                    align: CENTER
                    text: "${settings_icon}"
                    text_font: mdi_icons_28
                    text_color: color_misty_blue

    - obj:
        id: splash_layer
        width: 480
        height: 480
        bg_color: 0x2b3249
        border_opa: TRANSP
        radius: 0
        scrollable: false
        scrollbar_mode: "OFF"
        pad_all: 0
        widgets:
          - image:
              align: TOP_MID
              y: 56
              src: splash_homeassistant_img
          - obj:
              align: CENTER
              y: 16
              width: 420
              height: 150
              bg_opa: TRANSP
              border_opa: TRANSP
              scrollable: false
              scrollbar_mode: "OFF"
              pad_all: 0
              widgets:
                - spinner:
                    id: splash_spinner
                    align: TOP_MID
                    y: 0
                    width: 68
                    height: 68
                    spin_time: 2s
                    arc_length: 70deg
                    arc_width: 7
                    arc_color: 0x55628f
                    indicator:
                      arc_color: 0x8fa2d4
                      arc_width: 7
                - label:
                    id: splash_status_line
                    align: TOP_MID
                    y: 84
                    text: "Connecting to WiFi..."
                    text_font: montserrat_28
                    text_color: 0xb7c1df
                - label:
                    id: splash_retry_line
                    align: TOP_MID
                    y: 120
                    hidden: true
                    text: "Retries WiFi 0 | API 0"
                    text_font: montserrat_18
                    text_color: 0x7f8eb3
          - image:
              align: BOTTOM_MID
              y: -30
              src: splash_esphome_img
