            }
            id(forecast_hourly_temps)[i] = forecast["temperature"] | 0.0f;
            id(forecast_hourly_conditions)[i] = forecast["condition"] | "sunny";
          }
      - script.execute: update_hourly_display

  - id: update_daily_display
    then:
      - lambda: |-
          if (id(forecast_daily_count) == 0) return;
          if (!id(weather_page_forecast_daily)) return;
          
          lv_obj_clean(id(weather_page_forecast_daily));
          
          auto get_icon = [](const std::string& c) -> esphome::image::Image* {
            // Re-using the same icons mapped in your home dashboard
            if (c == "clear-night") return id(home_weather_clear_night_img);
            if (c == "cloudy") return id(home_weather_cloudy_img);
            if (c == "fog") return id(home_weather_fog_img);
            if (c == "hail") return id(home_weather_hail_img);
            if (c == "lightning") return id(home_weather_lightning_img);
            if (c == "lightning-rainy") return id(home_weather_lightning_rainy_img);
            if (c == "partlycloudy") return id(home_weather_partlycloudy_sun_img);
            if (c == "pouring") return id(home_weather_pouring_img);
            if (c == "rainy") return id(home_weather_rainy_img);
            if (c == "snowy") return id(home_weather_snowy_img);
            if (c == "snowy-rainy") return id(home_weather_snowy_rainy_img);
            if (c == "sunny") return id(home_weather_sunny_img);
            if (c == "windy") return id(home_weather_windy_img);
            if (c == "windy-variant") return id(home_weather_windy_variant_img);
            return id(home_weather_sunny_img);
          };
          
          auto get_day_name = [](int index) -> const char* {
            auto time_now = id(panel_time).now();
            int today_wday = time_now.day_of_week;
            int forecast_wday = (today_wday + index - 1) % 7 + 1;
            
            const char* day_keys[] = {
              "", "Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"
            };
            
            if (forecast_wday < 1 || forecast_wday > 7) return "???";
            return day_keys[forecast_wday];
          };
          
          lv_obj_t* cont = lv_obj_create(id(weather_page_forecast_daily));
          if (!cont) return;
          
          lv_obj_set_size(cont, 408, 250); // Increased for larger icons
          lv_obj_align(cont, LV_ALIGN_CENTER, 0, 5);
          lv_obj_set_style_bg_opa(cont, LV_OPA_TRANSP, 0);
          lv_obj_set_style_border_width(cont, 0, 0);
          lv_obj_set_style_pad_all(cont, 0, 0);
          lv_obj_set_style_pad_column(cont, 0, 0);
          lv_obj_set_flex_flow(cont, LV_FLEX_FLOW_ROW);
          
          for (int i = 0; i < id(forecast_daily_count); i++) {
            lv_obj_t* item = lv_obj_create(cont);
            if (!item) continue;
            
            lv_obj_set_size(item, 68, 240);
            lv_obj_set_style_bg_opa(item, LV_OPA_TRANSP, 0);
            lv_obj_set_style_border_width(item, 0, 0);
            lv_obj_set_style_pad_all(item, 0, 0);
            
            // Day Label
            lv_obj_t* day_label = lv_label_create(item);
            if (day_label) {
              lv_label_set_text(day_label, get_day_name(i));
              lv_obj_align(day_label, LV_ALIGN_TOP_MID, 0, 10);
              lv_obj_set_style_text_font(day_label, id(nunito_20), 0);
              lv_obj_set_style_text_color(day_label, lv_color_hex((id(color_steel_blue).r << 16) | (id(color_steel_blue).g << 8) | id(color_steel_blue).b), 0);
            }
            
            // Icon
            lv_obj_t* icon = lv_img_create(item);
            if (icon) {
              lv_img_set_src(icon, get_icon(id(forecast_daily_conditions)[i]));
              // The home weather icons are 128x128, so we'll scale them down to roughly half size
              lv_img_set_zoom(icon, 128); // 128 = 50%
              lv_obj_align(icon, LV_ALIGN_CENTER, 0, 0);
            }
            
            // Temp
            lv_obj_t* temp_label = lv_label_create(item);
            if (temp_label) {
              char temp_str[10];
              snprintf(temp_str, sizeof(temp_str), "%.0f°", id(forecast_daily_temps)[i]);
              lv_label_set_text(temp_label, temp_str);
              lv_obj_align(temp_label, LV_ALIGN_BOTTOM_MID, 0, -10);
              lv_obj_set_style_text_font(temp_label, id(nunito_20), 0);
              lv_obj_set_style_text_color(temp_label, lv_color_hex((id(color_misty_blue).r << 16) | (id(color_misty_blue).g << 8) | id(color_misty_blue).b), 0);
            }
          }

  - id: update_hourly_display
    then:
      - lambda: |-
          if (id(forecast_hourly_count) == 0) return;
          if (!id(weather_page_forecast_hourly)) return;
          
          lv_obj_clean(id(weather_page_forecast_hourly));
          
          auto get_icon = [](const std::string& c) -> esphome::image::Image* {
            if (c == "clear-night") return id(home_weather_clear_night_img);
            if (c == "cloudy") return id(home_weather_cloudy_img);
            if (c == "fog") return id(home_weather_fog_img);
            if (c == "hail") return id(home_weather_hail_img);
            if (c == "lightning") return id(home_weather_lightning_img);
            if (c == "lightning-rainy") return id(home_weather_lightning_rainy_img);
            if (c == "partlycloudy") return id(home_weather_partlycloudy_sun_img);
            if (c == "pouring") return id(home_weather_pouring_img);
            if (c == "rainy") return id(home_weather_rainy_img);
            if (c == "snowy") return id(home_weather_snowy_img);
            if (c == "snowy-rainy") return id(home_weather_snowy_rainy_img);
            if (c == "sunny") return id(home_weather_sunny_img);
            if (c == "windy") return id(home_weather_windy_img);
            if (c == "windy-variant") return id(home_weather_windy_variant_img);
            return id(home_weather_sunny_img);
          };
          
          auto get_time_str = [](time_t utc_timestamp) -> std::string {
            if (utc_timestamp == 0) return "--:--";
            
            auto local_now = id(panel_time).now();
            auto utc_now = id(panel_time).utcnow();
            
            int32_t offset_hours = local_now.hour - utc_now.hour;
            if (offset_hours > 12) offset_hours -= 24;
            if (offset_hours < -12) offset_hours += 24;
            
            int32_t tz_offset = offset_hours * 3600 + 
                              (local_now.minute - utc_now.minute) * 60 + 
                              (local_now.second - utc_now.second);
            
            time_t local_timestamp = utc_timestamp + tz_offset;
            struct tm local_tm;
            gmtime_r(&local_timestamp, &local_tm);
            
            char buf[10];
            snprintf(buf, sizeof(buf), "%02d:%02d", local_tm.tm_hour, local_tm.tm_min);
            return std::string(buf);
          };

          lv_obj_t* cont = lv_obj_create(id(weather_page_forecast_hourly));
          if (!cont) return;
          
          lv_obj_set_size(cont, LV_SIZE_CONTENT, 250);
          lv_obj_set_style_bg_opa(cont, LV_OPA_TRANSP, 0);
          lv_obj_set_style_border_width(cont, 0, 0);
          lv_obj_set_style_pad_all(cont, 0, 0);
          lv_obj_set_style_pad_column(cont, 0, 0);
          lv_obj_set_flex_flow(cont, LV_FLEX_FLOW_ROW);
          lv_obj_set_scrollbar_mode(cont, LV_SCROLLBAR_MODE_AUTO);
          lv_obj_set_scroll_dir(cont, LV_DIR_HOR);
          
          for (int i = 0; i < id(forecast_hourly_count); i++) {
            lv_obj_t* item = lv_obj_create(cont);
            if (!item) continue;
            
            lv_obj_set_size(item, 68, 240);
            lv_obj_set_style_bg_opa(item, LV_OPA_TRANSP, 0);
            lv_obj_set_style_border_width(item, 0, 0);
            lv_obj_set_style_pad_all(item, 2, 0);
            lv_obj_clear_flag(item, LV_OBJ_FLAG_SCROLLABLE);
            
            lv_obj_t* time_label = lv_label_create(item);
            if (time_label) {
              std::string time_str = get_time_str(id(forecast_hourly_timestamps)[i]);
              lv_label_set_text(time_label, time_str.c_str());
              lv_obj_align(time_label, LV_ALIGN_TOP_MID, 0, 10);
              lv_obj_set_style_text_font(time_label, id(nunito_16), 0);
              lv_obj_set_style_text_color(time_label, lv_color_hex((id(color_steel_blue).r << 16) | (id(color_steel_blue).g << 8) | id(color_steel_blue).b), 0);
            }
            
            lv_obj_t* icon = lv_img_create(item);
            if (icon) {
              lv_img_set_src(icon, get_icon(id(forecast_hourly_conditions)[i]));
              lv_img_set_zoom(icon, 128);
              lv_obj_align(icon, LV_ALIGN_CENTER, 0, 0);
            }
            
            lv_obj_t* temp_label = lv_label_create(item);
            if (temp_label) {
              char temp_str[10];
              snprintf(temp_str, sizeof(temp_str), "%.0f°", id(forecast_hourly_temps)[i]);
              lv_label_set_text(temp_label, temp_str);
              lv_obj_align(temp_label, LV_ALIGN_BOTTOM_MID, 0, -10);
              lv_obj_set_style_text_font(temp_label, id(nunito_20), 0);
              lv_obj_set_style_text_color(temp_label, lv_color_hex((id(color_misty_blue).r << 16) | (id(color_misty_blue).g << 8) | id(color_misty_blue).b), 0);
            }
          }

