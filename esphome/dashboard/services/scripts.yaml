  - id: apply_selected_theme
    then:
      - lambda: |-
          auto theme = id(theme_accent_select).state;
          if (theme.empty()) {
            theme = id(theme_name);
          }
          id(theme_name) = theme;
          uint32_t accent = 0x${tw_slate_500};
          if (theme == "gray") accent = 0x${tw_gray_500};
          else if (theme == "zinc") accent = 0x${tw_zinc_500};
          else if (theme == "neutral") accent = 0x${tw_neutral_500};
          else if (theme == "stone") accent = 0x${tw_stone_500};
          else if (theme == "red") accent = 0x${tw_red_500};
          else if (theme == "orange") accent = 0x${tw_orange_500};
          else if (theme == "amber") accent = 0x${tw_amber_500};
          else if (theme == "yellow") accent = 0x${tw_yellow_500};
          else if (theme == "lime") accent = 0x${tw_lime_500};
          else if (theme == "green") accent = 0x${tw_green_500};
          else if (theme == "emerald") accent = 0x${tw_emerald_500};
          else if (theme == "teal") accent = 0x${tw_teal_500};
          else if (theme == "cyan") accent = 0x${tw_cyan_500};
          else if (theme == "sky") accent = 0x${tw_sky_500};
          else if (theme == "blue") accent = 0x${tw_blue_500};
          else if (theme == "indigo") accent = 0x${tw_indigo_500};
          else if (theme == "violet") accent = 0x${tw_violet_500};
          else if (theme == "purple") accent = 0x${tw_purple_500};
          else if (theme == "fuchsia") accent = 0x${tw_fuchsia_500};
          else if (theme == "pink") accent = 0x${tw_pink_500};
          else if (theme == "rose") accent = 0x${tw_rose_500};

          auto mix = [](uint32_t base, uint32_t tint, float ratio) -> uint32_t {
            uint8_t br = (base >> 16) & 0xFF;
            uint8_t bg = (base >> 8) & 0xFF;
            uint8_t bb = base & 0xFF;
            uint8_t tr = (tint >> 16) & 0xFF;
            uint8_t tg = (tint >> 8) & 0xFF;
            uint8_t tb = tint & 0xFF;
            uint8_t rr = static_cast<uint8_t>(br + (tr - br) * ratio);
            uint8_t rg = static_cast<uint8_t>(bg + (tg - bg) * ratio);
            uint8_t rb = static_cast<uint8_t>(bb + (tb - bb) * ratio);
            return (static_cast<uint32_t>(rr) << 16) | (static_cast<uint32_t>(rg) << 8) | rb;
          };

          id(theme_accent_color) = accent;
          id(theme_background_color) = mix(0x${tw_slate_950}, accent, 0.16f);
          id(theme_panel_color) = mix(0x${tw_slate_900}, accent, 0.28f);
          id(theme_border_color) = mix(0x${tw_slate_700}, accent, 0.40f);
          id(theme_button_color) = mix(0x${tw_slate_700}, accent, 0.48f);
          id(theme_text_color) = 0x${tw_slate_200};
          id(theme_muted_color) = mix(0x${tw_slate_400}, accent, 0.20f);
          id(theme_icon_idle_color) = mix(0x${tw_slate_500}, accent, 0.24f);
      - logger.log:
          format: "[theme] Applied %s accent=%06X bg=%06X panel=%06X border=%06X"
          args:
            - 'id(theme_name).c_str()'
            - '(int) id(theme_accent_color)'
            - '(int) id(theme_background_color)'
            - '(int) id(theme_panel_color)'
            - '(int) id(theme_border_color)'
      - script.execute: refresh_theme
      - script.execute: refresh_lights
      - script.execute: update_settings_theme_label

