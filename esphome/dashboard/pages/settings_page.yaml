id: settings_page
widgets:
  - obj:
      id: settings_root_bg
      width: 480
      height: 480
      bg_color: color_black
      border_opa: transp
      radius: 0
      scrollable: false
      scrollbar_mode: "OFF"

  - obj:
      id: settings_card
      width: 440
      height: 330
      y: 60
      align: top_mid
      radius: 20
      bg_color: color_slate_blue_gray
      border_width: 1
      border_color: color_steel_blue
      pad_all: 0
      scrollable: false
      scrollbar_mode: "OFF"
      widgets:
        - label:
            id: settings_title_label
            x: 20
            y: 12
            text: "Theme"
            text_font: nunito_20
            text_color: color_misty_blue
        - label:
            id: settings_subtitle_label
            x: 20
            y: 50
            text: "Tailwind accent palette"
            text_font: nunito_18
            text_color: color_misty_blue

        - obj:
            id: settings_theme_selector_row
            x: 20
            y: 78
            width: 400
            height: 132
            radius: 18
            bg_color: color_black
            border_width: 1
            border_color: color_steel_blue
            scrollable: false
            scrollbar_mode: "OFF"
            widgets:
              - label:
                  id: settings_theme_value_label
                  align: top_mid
                  y: 8
                  text: "slate"
                  text_font: nunito_20
                  text_color: color_misty_blue

              - obj:
                  id: settings_theme_palette
                  x: 2
                  y: 34
                  width: 384
                  height: 94
                  bg_opa: transp
                  border_opa: transp
                  scrollable: false
                  scrollbar_mode: "OFF"
                  layout:
                    type: GRID
                    grid_columns: [34, 34, 34, 34, 34, 34, 34, 34, 34, 34, 34]
                    grid_rows: [44, 44]
                  widgets:
                    - button:
                        id: settings_chip_slate
                        grid_cell_column_pos: 0
                        grid_cell_row_pos: 0
                        width: 22
                        height: 22
                        radius: 11
                        bg_color: 0x${tw_slate_500}
                        border_width: 1
                        border_color: color_steel_blue
                        shadow_opa: transp
                        pad_all: 0
                        on_click:
                          - select.set:
                              id: theme_accent_select
                              option: "slate"
                    - button:
                        id: settings_chip_gray
                        grid_cell_column_pos: 1
                        grid_cell_row_pos: 0
                        width: 22
                        height: 22
                        radius: 11
                        bg_color: 0x${tw_gray_500}
                        border_width: 1
                        border_color: color_steel_blue
