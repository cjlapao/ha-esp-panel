obj:
  id: shared_top_bar
  hidden: true
  width: 480
  height: 40
  align: TOP_MID
  y: 0
  bg_opa: TRANSP
  border_opa: TRANSP
  scrollable: false
  scrollbar_mode: "OFF"
  pad_all: 0
  layout:
    type: FLEX
    flex_flow: ROW
    flex_align_main: SPACE_BETWEEN
    flex_align_cross: CENTER
  widgets:
    - obj:
        width: 140
        height: 36
        bg_opa: TRANSP
        border_opa: TRANSP
        scrollable: false
        scrollbar_mode: "OFF"
        layout:
          type: FLEX
          flex_flow: ROW
          flex_align_main: SPACE_EVENLY
          flex_align_cross: CENTER
        widgets:
          - label:
              id: wifi_icon_shared
              text: "\U000F05A9"
              text_font: mdi_26
              text_color: 0x64748b
          - label:
              id: ha_icon_shared
              text: "\U000F07D0"
              text_font: mdi_26
              text_color: 0x64748b
    - obj:
        width: 140
        height: 36
        bg_opa: TRANSP
        border_opa: TRANSP
        scrollable: false
        scrollbar_mode: "OFF"
        layout:
          type: FLEX
          flex_flow: ROW
          flex_align_main: SPACE_EVENLY
          flex_align_cross: CENTER
        widgets:
          - label:
              id: shield_icon_shared
              text: "\U000F0498"
              text_font: mdi_26
              text_color: 0x64748b
          - label:
              id: ac_icon_shared
              text: "\U000F001B"
              text_font: mdi_26
              text_color: 0x64748b
          - label:
              id: heat_icon_shared
              text: "\U000F0438"
              text_font: mdi_26
