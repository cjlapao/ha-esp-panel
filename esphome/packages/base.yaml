substitutions:
  node_name: panel-living-room
  friendly_name: Living Room Panel
  room_name: Living Room
  relay_pin: "2"
  ha_area_id: living_room

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}
  project:
    name: "home.panel_controller"
    version: "0.1.0"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

psram:

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ota_password

captive_portal:

switch:
  - platform: gpio
    id: local_relay
    name: "${room_name} Local Relay"
    pin: ${relay_pin}
    restore_mode: RESTORE_DEFAULT_OFF

binary_sensor:
  - platform: status
    name: "${room_name} API Connected"

sensor:
  - platform: wifi_signal
    name: "${room_name} WiFi Signal"
    update_interval: 30s

  - platform: uptime
    name: "${room_name} Uptime"
