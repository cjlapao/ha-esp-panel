            format: "%.0f"
            args: [id(weather_wind_outside).state]
      - lvgl.label.update:
          id: weather_wind_speed_unit
          text: "m/s"

  - platform: homeassistant
    id: room_temperature
    entity_id: ${temp_entity}
    on_value:
      - lvgl.label.update:
          id: temp_value_label
          text:
            format: "%.1f C"
            args: [id(room_temperature).state]
      - lvgl.label.update:
          id: home_center_temp_label
