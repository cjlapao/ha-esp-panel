    on_value:
      - lvgl.label.update:
          id: up_value_label
          text:
            format: "UL %.1f Mbps"
            args: [id(net_upload).state]

  - platform: homeassistant
    id: cover_left_pos
    entity_id: ${cover_left_entity}
    attribute: current_position
    on_value:
      - script.execute: refresh_covers

  - platform: homeassistant
    id: cover_center_pos
    entity_id: ${cover_center_entity}
    attribute: current_position
    on_value:
      - script.execute: refresh_covers

  - platform: homeassistant
    id: cover_right_pos
    entity_id: ${cover_right_entity}
    attribute: current_position
    on_value:
      - script.execute: refresh_covers

  - platform: wifi_signal
    id: wifi_signal_db
    name: "${room_name} WiFi Signal"
    update_interval: 30s
    on_value:
      - lvgl.label.update:
          id: wifi_status_label
          text:
            format: "WiFi %.0f dBm"
            args: [id(wifi_signal_db).state]

select:
  - platform: template
    id: theme_accent_select
    name: "${room_name} Theme Accent"
    optimistic: true
    restore_value: true
    initial_option: slate
    options:
      - slate
      - gray
      - zinc
      - neutral
      - stone
      - red
      - orange
      - amber
      - yellow
      - lime
      - green
      - emerald
      - teal
      - cyan
      - sky
      - blue
      - indigo
      - violet
      - purple
      - fuchsia
      - pink
      - rose
    on_value:
      - lambda: |-
          id(theme_name) = x;
          id(inactivity_seconds) = 0;
      - logger.log:
          format: "[theme] Requested accent: %s"
          args: ['x.c_str()']
      - script.execute: apply_selected_theme

number:
  - platform: template
    id: display_timeout_backlight
    name: "${room_name} Backlight Timeout"
    optimistic: true
    unit_of_measurement: "m"
    initial_value: 10
    restore_value: true
    min_value: -1
    max_value: 720
    step: 1
    mode: box

globals:
  - id: wifi_connected_flag
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: api_connected_flag
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: splash_done
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: wifi_retry_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: api_retry_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: boot_elapsed_sec
    type: int
    restore_value: false
    initial_value: '0'
  - id: inactivity_seconds
    type: int
    restore_value: false
    initial_value: '0'
  - id: active_page_id
    type: int
    restore_value: false
    initial_value: '0'
  - id: theme_name
    type: std::string
    restore_value: true
    initial_value: '"slate"'
  - id: theme_accent_color
    type: uint32_t
    restore_value: true
    initial_value: 0x${tw_slate_500}
  - id: theme_background_color
    type: uint32_t
    restore_value: true
    initial_value: 0x${tw_slate_950}
  - id: theme_panel_color
    type: uint32_t
    restore_value: true
