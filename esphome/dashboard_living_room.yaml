output:
  - platform: ledc
    pin: GPIO38
    id: backlight_output
    frequency: 200Hz

light:
  - platform: monochromatic
    output: backlight_output
    id: display_backlight
    name: "${room_name} Display Backlight"
    restore_mode: ALWAYS_ON

switch:
  - platform: gpio
    id: relay_light_1
    name: "${room_name} Relay Light 1"
    pin: ${relay_1_pin}
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: gpio
    id: relay_light_2
    name: "${room_name} Relay Light 2"
    pin: ${relay_2_pin}
    restore_mode: RESTORE_DEFAULT_OFF

binary_sensor:
  - platform: status
    id: api_connected
    name: "${room_name} API Connected"
    on_state:
      - lambda: |-
          id(api_connected_flag) = id(api_connected).state;
          if (id(api_connected).state) {
            id(api_retry_count) = 0;
          } else if (id(wifi_connected_flag)) {
            id(api_retry_count) += 1;
          }
      - logger.log:
          format: "[api] State changed: %s"
          args: ['id(api_connected).state ? "connected" : "disconnected"']
      - lvgl.label.update:
          id: api_status_label
          text: !lambda |-
            return id(api_connected).state ? std::string("HA: Online") : std::string("HA: Offline");
      - lvgl.label.update:
          id: api_status_label
          text_color: !lambda |-
            return id(api_connected).state ? lv_color_hex(0x22c55e) : lv_color_hex(0xef4444);
      - lvgl.label.update:
          id: ha_icon_shared
          text_color: !lambda |-
            return id(api_connected).state ? lv_color_hex(0x22c55e) : lv_color_hex(id(theme_icon_idle_color));
      - lvgl.label.update:
          id: ha_status
          text_color: !lambda |-
            return id(api_connected).state ? lv_color_hex(0x22c55e) : lv_color_hex(id(theme_icon_idle_color));
      - lvgl.label.update:
          id: splash_status_line
          text: !lambda |-
            if (id(api_connected).state) return std::string("System online. Loading dashboard...");
            if (id(wifi_connected_flag)) return std::string("WiFi up, waiting for API...");
            return std::string("Connecting to WiFi...");
      - script.execute: update_splash_retry_line
      - script.execute: maybe_finish_boot

  - platform: homeassistant
    id: light_1_state
    entity_id: ${light_1_entity}
    on_state:
      - script.execute: refresh_lights

  - platform: homeassistant
    id: light_2_state
    entity_id: ${light_2_entity}
    on_state:
      - script.execute: refresh_lights

  - platform: homeassistant
    id: light_3_state
    entity_id: ${light_3_entity}
    on_state:
      - script.execute: refresh_lights

  - platform: homeassistant
    id: light_4_state
    entity_id: ${light_4_entity}
    on_state:
      - script.execute: refresh_lights

  - platform: homeassistant
    id: presence_1
    entity_id: ${presence_1_entity}
    on_state:
      - script.execute: refresh_presence

  - platform: homeassistant
    id: presence_2
    entity_id: ${presence_2_entity}
    on_state:
      - script.execute: refresh_presence

  - platform: homeassistant
    id: presence_3
    entity_id: ${presence_3_entity}
    on_state:
      - script.execute: refresh_presence

text_sensor:
  - platform: wifi_info
    ssid:
      id: wifi_ssid_text
      on_value:
        - lvgl.label.update:
            id: wifi_detail_label
            text: !lambda |-
              if (id(wifi_ssid_text).state.empty()) {
                return std::string("SSID: --");
              }
              return std::string("SSID: ") + id(wifi_ssid_text).state;
    ip_address:
      id: wifi_ip_text
      on_value:
        - lvgl.label.update:
            id: ip_detail_label
            text: !lambda |-
              if (id(wifi_ip_text).state.empty()) {
                return std::string("IP: --");
              }
              return std::string("IP: ") + id(wifi_ip_text).state;
  - platform: homeassistant
    id: weather_state_text
    entity_id: ${weather_entity}
    on_value:
      - lvgl.label.update:
          id: home_weather_state_label
          text: !lambda |-
            if (id(weather_state_text).state.empty()) return std::string("--");
            return id(weather_state_text).state;
      - script.execute: update_home_weather_image

time:
  - platform: sntp
    id: panel_time
    timezone: Europe/London
    on_time:
      - seconds: /1
        then:
          - lvgl.label.update:
              id: home_time_label
              text: !lambda |-
                auto t = id(panel_time).now();
                if (!t.is_valid()) return std::string("--:--");
                return t.strftime("%H:%M");
          - lvgl.label.update:
              id: home_day_label
              text: !lambda |-
                auto t = id(panel_time).now();
                if (!t.is_valid()) return std::string("--");
                return t.strftime("%A");
          - lvgl.label.update:
              id: home_date_label
              text: !lambda |-
                auto t = id(panel_time).now();
                if (!t.is_valid()) return std::string("--");
                return t.strftime("%d, %B");

