      - lvgl.widget.show: shared_top_bar
      - lvgl.widget.show: shared_bottom_bar
      - lvgl.page.show: settings_page

  - id: update_home_weather_image
    then:
      - lambda: |-
          auto hide_all = []() {
            lv_obj_add_flag(id(weather_sunny_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_clear_night_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_cloudy_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_cloudy_night_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_partlycloudy_sun_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_partlycloudy_moon_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_rainy_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_rainy_night_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_pouring_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_pouring_night_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_snowy_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_snowy_night_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_snowy_rainy_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_fog_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_fog_night_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_hail_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_lightning_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_lightning_night_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_lightning_rainy_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_lightning_rainy_night_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_windy_image), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(weather_windy_variant_image), LV_OBJ_FLAG_HIDDEN);
          };

          hide_all();
          std::string weather = id(weather_state_text).state;
          auto show = [](lv_obj_t *obj) { lv_obj_clear_flag(obj, LV_OBJ_FLAG_HIDDEN); };

          auto now = id(panel_time).now();
          bool is_night = now.is_valid() && (now.hour < 6 || now.hour >= 20);

          if (weather == "sunny" || weather == "clear" || weather == "clear-day") show(is_night ? id(weather_clear_night_image) : id(weather_sunny_image));
          else if (weather == "clear-night") show(id(weather_clear_night_image));
          else if (weather == "cloudy") show(is_night ? id(weather_cloudy_night_image) : id(weather_cloudy_image));
          else if (weather == "partlycloudy") show(is_night ? id(weather_partlycloudy_moon_image) : id(weather_partlycloudy_sun_image));
          else if (weather == "partly-cloudy") show(is_night ? id(weather_partlycloudy_moon_image) : id(weather_partlycloudy_sun_image));
          else if (weather == "rainy") show(is_night ? id(weather_rainy_night_image) : id(weather_rainy_image));
          else if (weather == "pouring") show(is_night ? id(weather_pouring_night_image) : id(weather_pouring_image));
          else if (weather == "snowy") show(is_night ? id(weather_snowy_night_image) : id(weather_snowy_image));
          else if (weather == "snowy-rainy" || weather == "sleet") show(id(weather_snowy_rainy_image));
          else if (weather == "fog" || weather == "haze") show(is_night ? id(weather_fog_night_image) : id(weather_fog_image));
          else if (weather == "hail") show(id(weather_hail_image));
          else if (weather == "lightning") show(is_night ? id(weather_lightning_night_image) : id(weather_lightning_image));
          else if (weather == "lightning-rainy") show(is_night ? id(weather_lightning_rainy_night_image) : id(weather_lightning_rainy_image));
          else if (weather == "thunderstorm") show(is_night ? id(weather_lightning_night_image) : id(weather_lightning_image));
          else if (weather == "thunderstorm-rainy") show(is_night ? id(weather_lightning_rainy_night_image) : id(weather_lightning_rainy_image));
          else if (weather == "windy") show(id(weather_windy_image));
          else if (weather == "windy-variant") show(id(weather_windy_variant_image));
          else if (weather == "exceptional") show(is_night ? id(weather_lightning_rainy_night_image) : id(weather_lightning_rainy_image));
          else show(is_night ? id(weather_clear_night_image) : id(weather_sunny_image));

  - id: update_settings_theme_label
    then:
      - lvgl.label.update:
          id: settings_theme_value_label
          text: !lambda |-
            return id(theme_name);
      - lvgl.label.update:
          id: settings_theme_hex_label
          text: !lambda |-
            static char buf[16];
            snprintf(buf, sizeof(buf), "#%06X", (int) id(theme_accent_color));
            return std::string(buf);

  - id: apply_selected_theme
    then:
      - lambda: |-
          auto theme = id(theme_accent_select).state;
          if (theme.empty()) {
            theme = id(theme_name);
          }
          id(theme_name) = theme;
          uint32_t accent = 0x${tw_slate_500};
          if (theme == "gray") accent = 0x${tw_gray_500};
          else if (theme == "zinc") accent = 0x${tw_zinc_500};
          else if (theme == "neutral") accent = 0x${tw_neutral_500};
          else if (theme == "stone") accent = 0x${tw_stone_500};
          else if (theme == "red") accent = 0x${tw_red_500};
          else if (theme == "orange") accent = 0x${tw_orange_500};
          else if (theme == "amber") accent = 0x${tw_amber_500};
          else if (theme == "yellow") accent = 0x${tw_yellow_500};
          else if (theme == "lime") accent = 0x${tw_lime_500};
          else if (theme == "green") accent = 0x${tw_green_500};
          else if (theme == "emerald") accent = 0x${tw_emerald_500};
          else if (theme == "teal") accent = 0x${tw_teal_500};
          else if (theme == "cyan") accent = 0x${tw_cyan_500};
          else if (theme == "sky") accent = 0x${tw_sky_500};
          else if (theme == "blue") accent = 0x${tw_blue_500};
          else if (theme == "indigo") accent = 0x${tw_indigo_500};
          else if (theme == "violet") accent = 0x${tw_violet_500};
          else if (theme == "purple") accent = 0x${tw_purple_500};
          else if (theme == "fuchsia") accent = 0x${tw_fuchsia_500};
          else if (theme == "pink") accent = 0x${tw_pink_500};
          else if (theme == "rose") accent = 0x${tw_rose_500};

          auto mix = [](uint32_t base, uint32_t tint, float ratio) -> uint32_t {
            uint8_t br = (base >> 16) & 0xFF;
            uint8_t bg = (base >> 8) & 0xFF;
            uint8_t bb = base & 0xFF;
            uint8_t tr = (tint >> 16) & 0xFF;
            uint8_t tg = (tint >> 8) & 0xFF;
            uint8_t tb = tint & 0xFF;
            uint8_t rr = static_cast<uint8_t>(br + (tr - br) * ratio);
            uint8_t rg = static_cast<uint8_t>(bg + (tg - bg) * ratio);
            uint8_t rb = static_cast<uint8_t>(bb + (tb - bb) * ratio);
            return (static_cast<uint32_t>(rr) << 16) | (static_cast<uint32_t>(rg) << 8) | rb;
          };

          id(theme_accent_color) = accent;
          id(theme_background_color) = mix(0x${tw_slate_950}, accent, 0.16f);
          id(theme_panel_color) = mix(0x${tw_slate_900}, accent, 0.28f);
          id(theme_border_color) = mix(0x${tw_slate_700}, accent, 0.40f);
          id(theme_button_color) = mix(0x${tw_slate_700}, accent, 0.48f);
          id(theme_text_color) = 0x${tw_slate_200};
          id(theme_muted_color) = mix(0x${tw_slate_400}, accent, 0.20f);
          id(theme_icon_idle_color) = mix(0x${tw_slate_500}, accent, 0.24f);
      - logger.log:
          format: "[theme] Applied %s accent=%06X bg=%06X panel=%06X border=%06X"
          args:
            - 'id(theme_name).c_str()'
            - '(int) id(theme_accent_color)'
            - '(int) id(theme_background_color)'
            - '(int) id(theme_panel_color)'
            - '(int) id(theme_border_color)'
      - script.execute: refresh_theme
      - script.execute: refresh_lights
      - script.execute: update_settings_theme_label

  - id: update_splash_retry_line
    then:
      - if:
          condition:
            lambda: 'return (id(wifi_retry_count) + id(api_retry_count)) > 1;'
          then:
            - lvgl.widget.show: splash_retry_line
            - lvgl.label.update:
                id: splash_retry_line
                text: !lambda |-
                  static char buf[48];
                  snprintf(buf, sizeof(buf), "Retries WiFi %d | API %d", id(wifi_retry_count), id(api_retry_count));
                  return std::string(buf);
          else:
            - lvgl.widget.hide: splash_retry_line

  - id: maybe_finish_boot
    then:
      - if:
          condition:
            lambda: 'return !id(splash_done) && id(wifi_connected_flag) && id(api_connected_flag);'
          then:
            - logger.log: "[boot] WiFi + API connected, leaving splash"
            - lvgl.label.update:
                id: splash_status_line
                text: "Connected. Opening dashboard..."
            - delay: 600ms
            - lambda: 'id(splash_done) = true;'
            - lvgl.widget.hide: splash_layer

  - id: boot_monitor_tick
    then:
      - if:
          condition:
            lambda: 'return !id(splash_done);'
          then:
            - lambda: 'id(boot_elapsed_sec) += 2;'
            - lvgl.label.update:
                id: splash_status_line
                text: !lambda |-
                  if (!id(wifi_connected_flag)) return std::string("Connecting to WiFi...");
                  if (!id(api_connected_flag)) return std::string("WiFi connected. Waiting for API...");
                  return std::string("Connected. Loading dashboard...");
            - logger.log:
                format: "[boot] t=%ds wifi=%d api=%d retries(wifi=%d api=%d)"
                args: [ 'id(boot_elapsed_sec)', 'id(wifi_connected_flag)', 'id(api_connected_flag)', 'id(wifi_retry_count)', 'id(api_retry_count)' ]
            - if:
                condition:
                  lambda: 'return !id(wifi_connected_flag) && (id(boot_elapsed_sec) % 8 == 0);'
                then:
                  - lambda: 'id(wifi_retry_count) += 1;'
                  - logger.log:
                      format: "[wifi] Active retry #%d"
                      args: [ 'id(wifi_retry_count)' ]
                  - lvgl.label.update:
                      id: splash_status_line
                      text: "Connecting to WiFi..."
                  - script.execute: update_splash_retry_line
                  - wifi.disable:
                  - delay: 600ms
                  - wifi.enable:
            - if:
                condition:
                  lambda: 'return id(wifi_connected_flag) && !id(api_connected_flag) && (id(boot_elapsed_sec) % 10 == 0);'
                then:
                  - lambda: 'id(api_retry_count) += 1;'
                  - logger.log:
                      format: "[api] Waiting for API, retry marker #%d"
                      args: [ 'id(api_retry_count)' ]
                  - lvgl.label.update:
                      id: splash_status_line
                      text: "WiFi connected. Waiting for API..."
                  - script.execute: update_splash_retry_line
            - if:
                condition:
                  lambda: 'return id(boot_elapsed_sec) > 120 && !id(api_connected_flag);'
                then:
                  - logger.log: "[boot] API still unavailable after timeout"
                  - lvgl.label.update:
                      id: splash_status_line
                      text: "API timeout. Continuing in local mode."
                  - delay: 1200ms
                  - lambda: 'id(splash_done) = true;'
                  - lvgl.widget.hide: splash_layer

