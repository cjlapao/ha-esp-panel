    entity_id: ${light_level_entity}
    on_value:
      - lvgl.label.update:
          id: lux_value_label
          text:
            format: "%.0f lx"
            args: [id(room_light_level).state]

  - platform: homeassistant
    id: net_download
    entity_id: ${internet_download_entity}
    on_value:
      - lvgl.label.update:
          id: down_value_label
          text:
            format: "DL %.1f Mbps"
            args: [id(net_download).state]

  - platform: homeassistant
