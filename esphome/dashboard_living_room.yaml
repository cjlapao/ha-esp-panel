          id: settings_theme_hex_label
          text_color: !lambda |-
            return lv_color_hex(id(theme_muted_color));
      - lvgl.label.update:
          id: settings_theme_value_label
          text_color: !lambda |-
            return lv_color_hex(id(theme_text_color));
      - lvgl.label.update:
          id: wifi_detail_label
          text_color: !lambda |-
            return lv_color_hex(id(theme_muted_color));
      - lvgl.label.update:
          id: ip_detail_label
          text_color: !lambda |-
            return lv_color_hex(id(theme_muted_color));
      - if:
          condition:
            lambda: 'return !id(wifi_connected_flag);'
          then:
            - lvgl.label.update:
                id: wifi_icon_shared
                text_color: !lambda |-
                  return lv_color_hex(id(theme_icon_idle_color));
            - lvgl.label.update:
                id: wifi_status
                text_color: !lambda |-
                  return lv_color_hex(id(theme_icon_idle_color));
      - if:
          condition:
            lambda: 'return !id(api_connected_flag);'
          then:
            - lvgl.label.update:
                id: ha_icon_shared
                text_color: !lambda |-
                  return lv_color_hex(id(theme_icon_idle_color));
            - lvgl.label.update:
                id: ha_status
                text_color: !lambda |-
                  return lv_color_hex(id(theme_icon_idle_color));

  - id: refresh_lights
    then:
      - lvgl.obj.update:
          id: light_btn_1
          bg_color: !lambda |-
            return id(light_1_state).state ? lv_color_hex(id(theme_accent_color)) : lv_color_hex(id(theme_button_color));
      - lvgl.obj.update:
          id: light_btn_2
          bg_color: !lambda |-
            return id(light_2_state).state ? lv_color_hex(id(theme_accent_color)) : lv_color_hex(id(theme_button_color));
      - lvgl.obj.update:
          id: light_btn_3
          bg_color: !lambda |-
            return id(light_3_state).state ? lv_color_hex(id(theme_accent_color)) : lv_color_hex(id(theme_button_color));
      - lvgl.obj.update:
          id: light_btn_4
          bg_color: !lambda |-
            return id(light_4_state).state ? lv_color_hex(id(theme_accent_color)) : lv_color_hex(id(theme_button_color));

  - id: refresh_presence
    then:
      - lvgl.label.update:
          id: presence_label
          text: !lambda |-
            int active = (id(presence_1).state ? 1 : 0) + (id(presence_2).state ? 1 : 0) + (id(presence_3).state ? 1 : 0);
            static char buffer[32];
            snprintf(buffer, sizeof(buffer), "Presence %d/3", active);
            return buffer;

  - id: refresh_covers
    then:
      - lvgl.bar.update:
          id: left_cover_bar
          value: !lambda |-
            return (int)id(cover_left_pos).state;
          animated: true
      - lvgl.bar.update:
          id: center_cover_bar
          value: !lambda |-
            return (int)id(cover_center_pos).state;
          animated: true
      - lvgl.bar.update:
          id: right_cover_bar
          value: !lambda |-
            return (int)id(cover_right_pos).state;
          animated: true

i2c:
  - id: bus_a
    sda: GPIO19
    scl:
      number: GPIO45
      ignore_strapping_warning: true
    frequency: 100kHz

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

display:
  - platform: st7701s
    id: panel_display
    update_interval: never
    auto_clear_enabled: false
    data_rate: 2MHz
    spi_mode: MODE3
    color_order: RGB
    invert_colors: false
    dimensions:
      width: 480
      height: 480
    cs_pin: 39
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xCD, 0x00]
    pclk_frequency: 12MHz
    pclk_inverted: false
    data_pins:
      red: [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue: [4, 5, 6, 7, 15]

touchscreen:
  platform: gt911
  id: touch_id
  display: panel_display
  on_touch:
    - lambda: |-
        id(inactivity_seconds) = 0;
    - if:
        condition:
          light.is_off: display_backlight
        then:
          - logger.log: "[ui] Wake display on touch"
          - light.turn_on: display_backlight

lvgl:
  displays:
    - panel_display
  touchscreens:
    - touchscreen_id: touch_id
  page_wrap: false
  top_layer: !include living_room/ui/top_layer.yaml
  pages: !include living_room/ui/pages.yaml

interval:
  - interval: 1s
    then:
      - lambda: |-
          id(inactivity_seconds) += 1;
      - if:
          condition:
            lambda: 'return id(inactivity_seconds) > 20 && id(active_page_id) != 0;'
          then:
            - logger.log: "[ui] Inactivity timeout -> home page"
            - script.execute: go_home_page

  - interval: 2s
    then:
      - script.execute: boot_monitor_tick

  - interval: 8s
    then:
      - script.execute: refresh_lights
      - script.execute: refresh_covers
      - script.execute: refresh_presence
