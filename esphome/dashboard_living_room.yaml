substitutions:
  node_name: panel-living-room
  friendly_name: Living Room Panel
  room_name: Living Room

  # Device fallback relays (update to real pins for your board wiring)
  relay_1_pin: GPIO1
  relay_2_pin: GPIO2

  # Home Assistant entities
  weather_entity: weather.forecast_home
  temp_entity: sensor.living_room_temperature
  light_level_entity: sensor.living_room_presence_sensor_light_sensor_light_level
  internet_download_entity: sensor.internet_download_mbps
  internet_upload_entity: sensor.internet_upload_mbps

  light_1_entity: light.dining_light
  light_2_entity: light.sofa_light
  light_3_entity: light.living_room_wall_lights
  light_4_entity: light.tv_stand_leds

  cover_left_entity: cover.left_living_room_blind
  cover_center_entity: cover.center_living_room_blind
  cover_right_entity: cover.right_living_room_blind

  presence_1_entity: binary_sensor.office_left_presence_sensor_sofa
  presence_2_entity: binary_sensor.office_presence_sensor_sofa
  presence_3_entity: binary_sensor.living_room_presence_sensor_presence_sensor_4

  # Guition home icon substitutions
  lock_icon: "\U0000e92e"
  lock_variant_icon: "\U000F0341"
  air_conditioner_icon: "\U0000e93b"
  heating_icon: "\U0000e936"
  ha_icon: "\U000F07D0"
  wifi_100_icon: "\U0000e934"
  humidity_icon: "\U0000e938"
  ceiling_lights_icon: "\U000F18DD"
  dashboard_icon: "\U000F056E"
  brightness_icon: "\U000F1A4D"
  home_icon: "\U000F06A1"
  weather_icon: "\U000F18F6"
  info_icon: "\U000F1C70"
  settings_icon: "\U000F08BB"
  shield_arming_icon: "\U000F0498"
  windsock_icon: "\U000F15FA"

  <<: !include living_room/theme/tailwind_palette.yaml

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}
  compile_process_limit: 1
  project:
    name: home.panel_controller
    version: "0.2.0-native"
  on_boot:
    priority: 300
    then:
      - logger.log: "[boot] Starting splash boot sequence"
      - lvgl.widget.show: splash_layer
      - lvgl.label.update:
          id: splash_status_line
          text: "Connecting to WiFi..."
      - lvgl.widget.hide: splash_retry_line
      - lvgl.label.update:
          id: splash_retry_line
          text: "Retries WiFi 0 | API 0"
      - script.execute: apply_selected_theme

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_MBEDTLS_CERTIFICATE_BUNDLE: "n"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG
  baud_rate: 115200
  hardware_uart: UART0
  logs:
    wifi: DEBUG
    api: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  output_power: 20.5dB
  reboot_timeout: 10min
  ap:
    ssid: "${friendly_name} Setup"
    password: !secret ota_password
  on_connect:
    - logger.log: "[wifi] Connected to configured network"
    - lambda: |-
        id(wifi_connected_flag) = true;
    - lvgl.label.update:
        id: wifi_status_label
        text: "WiFi Connected"
        text_color: 0x22c55e
    - lvgl.label.update:
        id: wifi_icon_shared
        text_color: 0x22c55e
    - lvgl.label.update:
        id: wifi_status
        text_color: 0x22c55e
    - lvgl.label.update:
        id: splash_status_line
        text: "Connecting to Home Assistant API..."
    - script.execute: update_splash_retry_line
    - script.execute: maybe_finish_boot
  on_disconnect:
    - logger.log: "[wifi] Disconnected; retrying"
    - lambda: |-
        id(wifi_connected_flag) = false;
        id(api_connected_flag) = false;
        id(wifi_retry_count) += 1;
    - lvgl.label.update:
        id: wifi_status_label
        text: "WiFi Disconnected"
        text_color: 0xef4444
    - lvgl.label.update:
        id: wifi_icon_shared
        text_color: !lambda |-
          return lv_color_hex(id(theme_icon_idle_color));
    - lvgl.label.update:
        id: wifi_status
        text_color: !lambda |-
          return lv_color_hex(id(theme_icon_idle_color));
    - lvgl.label.update:
        id: splash_status_line
        text: "Retrying WiFi connection..."
    - script.execute: update_splash_retry_line
    - if:
        condition:
          lambda: 'return (id(wifi_retry_count) % 5) == 0;'
        then:
          - logger.log: "[wifi] Forcing WiFi stack restart after 5 retries"
          - wifi.disable:
          - delay: 1200ms
          - wifi.enable:

