name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install esphome yamllint

      - name: Prepare secrets
        run: cp esphome/secrets.example.yaml esphome/secrets.yaml

      - name: Lint YAML
        run: ./scripts/lint.sh

      - name: Validate ESPHome configs
        run: ./scripts/validate.sh
