lvgl:
  pages:
    - id: devices_page
      bg_color: color_black
      scrollable: false
      widgets:
        - obj:
            id: devices_panel
            y: 20
            width: 440
            height: 440
            align: top_mid
            clickable: false
            scrollable: false
            radius: 20
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            border_width: 0
            shadow_opa: transp
            layout:
              type: flex
              flex_flow: column
              flex_align_main: center
              flex_align_cross: center
              flex_align_track: center
            widgets:

              # Alarm panel button
              - button:
                  id: devices_alarm_panel_btn
                  width: 130
                  height: 40
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: nunito_18
                        text_color: color_misty_blue
                        text: "Alarm Panel"
                  # on_click:
                  #   - lvgl.page.show: ${alarm_panel_widget_name_1}_page
                  #   - delay: 250ms
                  #   - lambda: |-
                  #       int alarm_panels = ${alarm_panels_amount};
                  #       if (alarm_panels >= 2) {
                  #         lv_obj_clear_flag(id(alarm_panel_select_widget), LV_OBJ_FLAG_HIDDEN);
                  #       }

              # Boiler button
              - button:
                  id: devices_boiler_btn
                  width: 130
                  height: 40
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: nunito_18
                        text_color: color_misty_blue
                        text: "Boiler"
                  # on_click:
                  #   - lvgl.page.show: boiler_ch_page
                  #   - lvgl.widget.show: boiler_select_widget
              # Climate button
              - button:
                  id: devices_climate_btn
                  width: 130
                  height: 40
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: nunito_18
                        text_color: color_misty_blue
                        text: "Climate"
                  on_click:
                    - lvgl.page.show: climate_page

              # Cover button
              - button:
                  id: devices_cover_btn
                  width: 130
                  height: 40
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: nunito_18
                        text_color: color_misty_blue
                        text: "Cover"
                  # on_click:
                  #   - lvgl.page.show: ${cover_widget_name_1}_cover_page
                  #   - delay: 250ms
                  #   - lambda: |-
                  #       int covers = ${covers_amount};
                  #       if (covers >= 2) {
                  #         lv_obj_clear_flag(id(cover_select_widget), LV_OBJ_FLAG_HIDDEN);
                  #       }

              # Fan button
              - button:
                  id: devices_fan_btn
                  width: 130
                  height: 40
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: nunito_18
                        text_color: color_misty_blue
                        text: "Fan"
                  on_click:
                    - lvgl.page.show: ${fan_widget_name_1}_page
                    - delay: 250ms
                    - lambda: |-
                        int fans = ${fans_amount};
                        if (fans >= 2) {
                          lv_obj_clear_flag(id(fan_select_widget), LV_OBJ_FLAG_HIDDEN);
                        }

              # Media Player button
              - button:
                  id: devices_media_player_btn
                  width: 130
                  height: 40
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: nunito_18
                        text_color: color_misty_blue
                        text: "Media player"
                  # on_click:
                  #   - lvgl.page.show: media_player_page

              # Vacuum button
              - button:
                  id: devices_vacuum_btn
                  width: 130
                  height: 40
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: nunito_18
                        text_color: color_misty_blue
                        text: "Vacuum"
                  on_click:
                    - lvgl.page.show: vacuum_page